<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Test - SpinX</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen pb-20">
  <div class="container mx-auto px-4 py-8">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-3xl font-bold text-center mb-8 text-gradient">WebSocket Test Dashboard</h1>

      <!-- Connection Status -->
      <div class="glass-card p-6 mb-6">
        <h2 class="text-xl font-bold mb-4">Connection Status</h2>
        <div class="flex items-center gap-4">
          <div id="connection-status" class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <span class="text-red-400">Disconnected</span>
          </div>
          <button id="connect-btn" class="btn btn-primary">Connect</button>
          <button id="disconnect-btn" class="btn btn-secondary">Disconnect</button>
        </div>
        <div class="mt-4">
          <p class="text-sm text-gray-400">User ID: <span id="user-id">-</span></p>
          <p class="text-sm text-gray-400">Session ID: <span id="session-id">-</span></p>
        </div>
      </div>

      <!-- Send Test Messages -->
      <div class="glass-card p-6 mb-6">
        <h2 class="text-xl font-bold mb-4">Send Test Messages</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button id="send-notification-btn" class="btn btn-success">Send Test Notification</button>
          <button id="send-data-update-btn" class="btn btn-info">Send Data Update</button>
          <button id="send-session-update-btn" class="btn btn-warning">Send Session Update</button>
          <button id="sync-btn" class="btn btn-primary">Sync</button>
        </div>
      </div>

      <!-- Notifications Panel -->
      <div class="glass-card p-6 mb-6">
        <h2 class="text-xl font-bold mb-4">Notifications</h2>
        <div id="notifications-list" class="space-y-2">
          <p class="text-gray-400 text-center py-4">No notifications yet</p>
        </div>
        <button id="clear-notifications-btn" class="btn btn-secondary mt-4">Clear All</button>
      </div>

      <!-- Messages Log -->
      <div class="glass-card p-6">
        <h2 class="text-xl font-bold mb-4">Messages Log</h2>
        <div id="messages-log" class="bg-black/20 rounded-lg p-4 max-h-96 overflow-y-auto font-mono text-sm">
          <p class="text-gray-400">Waiting for messages...</p>
        </div>
        <button id="clear-log-btn" class="btn btn-secondary mt-4">Clear Log</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <script type="module">
    import { WebSocketClient } from './js/core/WebSocketClient.js';
    import { NotificationManager } from './js/core/NotificationManager.js';

    class WebSocketTest {
      constructor() {
        this.wsClient = null;
        this.notificationManager = null;
        this.init();
      }

      init() {
        this.wsClient = new WebSocketClient();
        this.notificationManager = new NotificationManager();

        this.setupEventListeners();
        this.updateConnectionStatus();
      }

      setupEventListeners() {
        // Connection buttons
        document.getElementById('connect-btn').addEventListener('click', () => {
          this.wsClient.connect();
        });

        document.getElementById('disconnect-btn').addEventListener('click', () => {
          this.wsClient.disconnect();
        });

        // Test message buttons
        document.getElementById('send-notification-btn').addEventListener('click', () => {
          this.sendTestNotification();
        });

        document.getElementById('send-data-update-btn').addEventListener('click', () => {
          this.sendTestDataUpdate();
        });

        document.getElementById('send-session-update-btn').addEventListener('click', () => {
          this.sendTestSessionUpdate();
        });

        document.getElementById('sync-btn').addEventListener('click', () => {
          this.sync();
        });

        // Clear buttons
        document.getElementById('clear-notifications-btn').addEventListener('click', () => {
          this.notificationManager.clearAllNotifications();
          this.updateNotificationsList();
        });

        document.getElementById('clear-log-btn').addEventListener('click', () => {
          document.getElementById('messages-log').innerHTML = '<p class="text-gray-400">Waiting for messages...</p>';
        });

        // WebSocket events
        this.wsClient.on('websocket:connected', (data) => {
          this.updateConnectionStatus();
          this.logMessage('Connected', data);
        });

        this.wsClient.on('websocket:disconnected', (data) => {
          this.updateConnectionStatus();
          this.logMessage('Disconnected', data);
        });

        this.wsClient.on('websocket:error', (error) => {
          this.logMessage('Error', error);
        });

        this.wsClient.on('notification', (notification) => {
          this.logMessage('Notification received', notification);
          this.updateNotificationsList();
        });

        this.wsClient.on('data:update', (update) => {
          this.logMessage('Data update', update);
        });

        this.wsClient.on('session:update', (update) => {
          this.logMessage('Session update', update);
        });

        this.wsClient.on('sync:response', (response) => {
          this.logMessage('Sync response', response);
        });

        // Notification manager events
        this.notificationManager.on('notification:added', (notification) => {
          this.updateNotificationsList();
        });
      }

      updateConnectionStatus() {
        const statusEl = document.getElementById('connection-status');
        const userIdEl = document.getElementById('user-id');
        const sessionIdEl = document.getElementById('session-id');

        if (this.wsClient.isConnected) {
          statusEl.innerHTML = `
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
            <span class="text-green-400">Connected</span>
          `;
          userIdEl.textContent = this.wsClient.userId || '-';
          sessionIdEl.textContent = this.wsClient.sessionId || '-';
        } else {
          statusEl.innerHTML = `
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <span class="text-red-400">Disconnected</span>
          `;
          userIdEl.textContent = '-';
          sessionIdEl.textContent = '-';
        }
      }

      sendTestNotification() {
        const notifications = [
          { type: 'info', title: 'Info Notification', message: 'This is an info notification' },
          { type: 'success', title: 'Success!', message: 'Operation completed successfully' },
          { type: 'warning', title: 'Warning', message: 'Please check your input' },
          { type: 'error', title: 'Error', message: 'Something went wrong' }
        ];

        const randomNotif = notifications[Math.floor(Math.random() * notifications.length)];
        this.notificationManager.addNotification(randomNotif);
      }

      sendTestDataUpdate() {
        // Simulate data update
        this.wsClient.emit('data:update', {
          type: 'test_update',
          data: { value: Math.random() * 100 },
          timestamp: Date.now()
        });
      }

      sendTestSessionUpdate() {
        // Simulate session update
        this.wsClient.emit('session:update', {
          type: 'test_session',
          data: { status: 'active' },
          timestamp: Date.now()
        });
      }

      sync() {
        // Trigger sync
        this.wsClient.send({
          type: 'sync',
          userId: this.wsClient.userId,
          timestamp: Date.now()
        });
      }

      updateNotificationsList() {
        const listEl = document.getElementById('notifications-list');
        const notifications = this.notificationManager.notifications;

        if (notifications.length === 0) {
          listEl.innerHTML = '<p class="text-gray-400 text-center py-4">No notifications yet</p>';
          return;
        }

        listEl.innerHTML = notifications.slice(0, 10).map(notif => `
          <div class="notification-item ${notif.read ? '' : 'unread'}">
            <div class="notification-item-header">
              <div class="notification-item-title">${notif.title}</div>
              <div class="notification-item-time">${new Date(notif.timestamp).toLocaleTimeString()}</div>
            </div>
            <div class="notification-item-message">${notif.message}</div>
          </div>
        `).join('');
      }

      logMessage(type, data) {
        const logEl = document.getElementById('messages-log');
        const time = new Date().toLocaleTimeString();
        const messageHtml = `
          <div class="mb-2 pb-2 border-b border-white/10">
            <span class="text-gray-300">[${time}]</span>
            <span class="text-blue-400 font-bold">${type}:</span>
            <pre class="text-green-400 mt-1 whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>
          </div>
        `;

        logEl.insertAdjacentHTML('afterbegin', messageHtml);

        // Keep only last 50 messages
        const messages = logEl.children;
        if (messages.length > 50) {
          logEl.removeChild(messages[messages.length - 1]);
        }
      }
    }

    // Initialize test dashboard
    new WebSocketTest();
  </script>
</body>
</html>
