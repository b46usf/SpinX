<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>spinX Booster - Lucky Wheel Promo for Your School</title>
  <meta name="description" content="Booster bisnis kantin sekolah Anda dengan spinX Lucky Wheel - promo wheel interaktif untuk menarik pelanggan">
  <link rel="icon" href="data:,">
  
  <!-- Disable FedCM for better compatibility with COOP policies -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/landing-refactor.css">
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- SweetAlert2 for toast notifications -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.5/dist/sweetalert2.all.min.js"></script>
  
  <!-- Google Sign-In -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>

<body class="landing-hero">

  <!-- Main App Container - Components will be rendered here by App.js -->
  <main id="app">
    <!-- Loading state while components initialize -->
    <div class="loading-container">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-center">
          <i class="fas fa-dharmachakra text-white text-2xl"></i>
        </div>
      </div>
      <p class="loading-text">Memuat informasi</p>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-20 right-4 z-50"></div>
  
  <!-- Register Modal Container -->
  <div id="register-modal-container"></div>

  <!-- NEW: Subscription Expiry Modal -->
  <div id="subscription-expiry-modal" class="fixed inset-0 bg-black bg-opacity-75 z-[9999] hidden flex items-center justify-center p-4" role="dialog">
    <div class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 backdrop-blur-xl rounded-2xl p-8 max-w-md w-full max-h-[90vh] overflow-y-auto shadow-2xl border border-slate-700/50">
      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-gradient-to-r from-red-500 to-pink-500 rounded-xl flex items-center justify-center shadow-lg">
            <i class="fas fa-calendar-xmark text-white text-xl"></i>
          </div>
          <div>
            <h3 class="text-2xl font-bold bg-gradient-to-r from-red-400 to-pink-400 bg-clip-text text-transparent">Subscription Expired</h3>
            <p id="modal-school-name" class="text-slate-400 font-medium text-lg mt-1"></p>
          </div>
        </div>
        <button id="modal-close-btn" class="p-2 hover:bg-slate-800 rounded-xl transition-all">
          <i class="fas fa-times text-slate-400 hover:text-white text-xl"></i>
        </button>
      </div>

      <!-- Content -->
      <div class="space-y-5 mb-8">
        <div class="bg-slate-800/50 rounded-xl p-6 border border-slate-700/50">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-blue-500/20 rounded-lg flex items-center justify-center">
              <i class="fas fa-school text-blue-400 text-lg"></i>
            </div>
            <div>
              <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-1">Plan</p>
              <p id="modal-plan" class="text-xl font-bold text-white">Starter</p>
            </div>
          </div>
          
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500/20 rounded-lg flex items-center justify-center">
              <i class="fas fa-calendar-times text-yellow-400 text-lg"></i>
            </div>
            <div>
              <p class="text-slate-400 text-sm font-medium uppercase tracking-wider mb-1">Expires</p>
              <p id="modal-expires" class="text-lg font-semibold text-white"></p>
            </div>
          </div>
        </div>

        <div class="bg-gradient-to-r from-red-500/10 to-pink-500/10 rounded-xl p-5 border border-red-500/20">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 bg-red-500/20 rounded-lg flex items-center justify-center">
              <i class="fas fa-exclamation-triangle text-red-400 text-lg"></i>
            </div>
            <h4 class="text-lg font-bold text-white">Action Required</h4>
          </div>
          <p class="text-slate-300 mb-4 leading-relaxed">Sekolah Anda tidak dapat digunakan karena subscription sudah expired. Hubungi admin sekolah untuk perpanjangan.</p>
          <div class="flex gap-3 pt-3 border-t border-red-500/20">
            <p class="text-sm text-slate-400 flex items-center gap-1">
              <i class="fas fa-clock text-yellow-400"></i>
              <span id="modal-days-remaining"></span>
            </p>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex flex-col sm:flex-row gap-3 pt-6 border-t border-slate-700/50">
        <button id="modal-contact-admin" class="flex-1 py-3 px-6 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 text-center">
          <i class="fas fa-phone mr-2"></i>
          Hubungi Admin
        </button>
        <button id="modal-close-action" class="flex-1 py-3 px-6 bg-slate-800/50 hover:bg-slate-700/50 border border-slate-600/50 text-slate-300 font-semibold rounded-xl backdrop-blur-sm transition-all duration-300 hover:border-slate-500/50 hover:text-white">
          Tutup
        </button>
      </div>
    </div>
  </div>

  <!-- Single module entry point -->
  <script type="module" src="js/App.js"></script>
</body>
</html>
