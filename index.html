
<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpinX - Lucky Wheel Festival</title>
  <link rel="icon" href="data:,">
  
  <!-- Disable FedCM for better compatibility with COOP policies -->
  <!-- Note: Client ID should be configured in js/auth/Config.js via environment variables -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- SweetAlert2 for toast notifications -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.5/dist/sweetalert2.all.min.js"></script>
  
  <!-- Google Sign-In -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <!-- Theme Toggle Button (Fixed Position) -->
  <div id="theme-toggle-container"></div>

  <!-- Main App Container - Components will be rendered here by App.js -->
  <main id="app">
    <!-- Loading state while components initialize -->
    <div class="glass-card p-8 w-full max-w-md text-center">
      <i class="fas fa-spinner fa-spin text-4xl text-indigo-400"></i>
      <p class="text-secondary mt-4">Memuat aplikasi...</p>
    </div>
  </main>

  <!-- Load scripts in proper order (modular architecture) -->
  
  <!-- Single module entry point -->
  <script type="module" src="js/App.js"></script>

</html>
