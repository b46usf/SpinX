<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpinX - Lucky Wheel Festival</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <!-- Theme Toggle Button (Fixed Position) -->
  <div id="theme-toggle-container"></div>

  <!-- Main App Container - Components will be rendered here by App.js -->
  <main id="app">
    <!-- Loading state while components initialize -->
    <div class="glass-card p-8 w-full max-w-md text-center">
      <i class="fas fa-spinner fa-spin text-4xl text-indigo-400"></i>
      <p class="text-secondary mt-4">Memuat aplikasi...</p>
    </div>
  </main>

  <!-- ============================================
       AUTH MODULES (load first - dependencies)
       ============================================ -->
  <script src="js/auth/config.js"></script>
  <script src="js/auth/AuthState.js"></script>
  <script src="js/auth/AuthApi.js"></script>
  <script src="js/auth/utils/JwtParser.js"></script>
  <script src="js/auth/utils/AuthRouter.js"></script>

  <!-- ============================================
       COMPONENT UTILITIES & CONFIG
       ============================================ -->
  <script src="js/components/config/RoleFields.js"></script>
  <script src="js/components/utils/ErrorHandler.js"></script>

  <!-- ============================================
       COMPONENT TEMPLATES
       ============================================ -->
  <script src="js/components/templates/LoginTemplates.js"></script>
  <script src="js/components/templates/RegisterTemplates.js"></script>

  <!-- ============================================
       COMPONENT HANDLERS
       ============================================ -->
  <script src="js/components/utils/RegisterHandler.js"></script>

  <!-- ============================================
       MAIN COMPONENTS
       ============================================ -->
  <script src="js/components/ThemeToggle.js"></script>
  <script src="js/components/LoginComponent.js"></script>
  <script src="js/components/RegisterComponent.js"></script>

  <!-- ============================================
       APP ORCHESTRATOR
       ============================================ -->
  <script src="js/App.js"></script>

  <!-- ============================================
       INITIALIZATION
       ============================================ -->
  <script type="module">
    // Import application modules
    import googleAuth from './js/auth/googleAuth.js';
    
    // Make googleAuth available globally for components
    window.googleAuth = googleAuth;

    // Initialize app when DOM is ready
    document.addEventListener('DOMContentLoaded', async () => {
      // Wait for all components to be available
      await waitForComponents();
      
      // Initialize and start the application
      const app = new App();
      await app.init();
    });

    /**
     * Wait for required components to be loaded
     */
    function waitForComponents() {
      return new Promise((resolve) => {
        const checkInterval = setInterval(() => {
          if (window.App && window.googleAuth && window.ThemeToggle && 
              window.LoginComponent && window.RegisterComponent) {
            clearInterval(checkInterval);
            resolve();
          }
        }, 50);
        
        // Timeout after 5 seconds
        setTimeout(() => {
          clearInterval(checkInterval);
          resolve();
        }, 5000);
      });
    }
  </script>

</body>
</html>
