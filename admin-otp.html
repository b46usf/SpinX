<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpinX - Admin OTP Verification</title>
  <meta name="description" content="SpinX Admin System - Verifikasi OTP">
  <link rel="icon" href="data:,">
  
  <!-- Disable FedCM for better compatibility with COOP policies -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- SweetAlert2 for toast notifications -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.5/dist/sweetalert2.all.min.js"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Animated Background -->
  <div class="absolute inset-0 bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 opacity-50"></div>
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl animate-pulse"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-pink-500/20 rounded-full blur-3xl animate-pulse" style="animation-delay: 1s;"></div>

  <!-- Main Card -->
  <div class="relative w-full max-w-sm">
    <div class="bg-gray-900/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-gray-700/50 p-6 animate-scale-in">
      
      <!-- Logo & Title -->
      <div class="text-center mb-5">
        <div class="w-16 h-16 mx-auto mb-3 rounded-2xl bg-gradient-to-br from-green-500 via-cyan-500 to-blue-500 flex items-center justify-center shadow-lg shadow-green-500/30">
          <i class="fas fa-shield-alt text-2xl text-white"></i>
        </div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-green-400 via-cyan-400 to-blue-400 bg-clip-text text-transparent">
          Verifikasi OTP
        </h1>
        <p class="text-gray-400 text-xs mt-1">Masukkan kode OTP dari Telegram</p>
      </div>

      <!-- User Info -->
      <div id="user-info" class="flex items-center gap-3 p-3 bg-gray-800/50 rounded-xl mb-4">
        <div class="w-10 h-10 rounded-full bg-indigo-500/20 flex items-center justify-center">
          <i class="fas fa-user text-indigo-400"></i>
        </div>
        <div class="text-left min-w-0">
          <div id="user-name" class="font-semibold text-white text-sm truncate">Admin</div>
          <div id="user-email" class="text-gray-400 text-xs truncate">admin@example.com</div>
        </div>
      </div>

      <!-- OTP Form -->
      <form id="otp-form" class="space-y-4">
        <!-- OTP Input -->
        <div class="input-group">
          <label class="block text-xs font-medium mb-2 text-left text-gray-400">
            <i class="fas fa-key mr-1 text-green-400"></i>Kode OTP *
          </label>
          <input type="text" id="otp-code" name="otpCode" required placeholder="Masukkan 6 digit kode OTP" 
            class="w-full px-3 py-3 bg-gray-800/50 border border-gray-600 rounded-xl text-white text-center text-lg tracking-widest focus:border-green-500 focus:ring-2 focus:ring-green-500/20 font-mono"
            maxlength="6" pattern="\d*" inputmode="numeric">
        </div>

        <!-- OTP ID (hidden) -->
        <input type="hidden" id="otp-id" name="otpId" value="">

        <!-- Submit Button -->
        <button type="submit" class="w-full py-3 bg-gradient-to-r from-green-600 to-cyan-600 hover:from-green-700 hover:to-cyan-700 text-white font-semibold rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg text-sm">
          <i class="fas fa-check-circle mr-2"></i>Verifikasi
        </button>

        <!-- Resend OTP -->
        <div class="text-center">
          <button type="button" id="resend-otp-btn" class="text-gray-400 text-xs hover:text-cyan-400 transition-colors">
            <i class="fas fa-redo mr-1"></i>Kirim Ulang OTP
          </button>
        </div>
      </form>

      <!-- Error Display -->
      <div id="otp-error" class="hidden mt-4 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-xs text-center"></div>

    </div>

    <!-- Back to Login -->
    <div class="mt-4 text-center">
      <a href="adsys.html" class="text-gray-500 text-xs hover:text-gray-400 transition-colors">
        <i class="fas fa-arrow-left mr-1"></i>Kembali ke Login
      </a>
    </div>

    <!-- Version -->
    <p class="text-center text-gray-600 text-[10px] mt-4">v1.0.0</p>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-20 right-4 z-50"></div>

  <!-- Modular Scripts -->
  <script type="module">
    // Import Toast FIRST
    import './js/components/utils/Toast.js';
    
    // Import Auth API
    import { authApi } from './js/auth/AuthApi.js';

    // Get Toast from global
    const getToast = () => window.Toast || null;

    class AdminOTP {
      constructor() {
        this.initialized = false;
        this.userData = null;
        this.otpId = null;
      }

      async init() {
        // Get stored user data
        this.userData = this.getStoredUserData();
        
        if (!this.userData) {
          // No user data - redirect to admin login
          this.redirectToLogin();
          return;
        }

        // Display user info
        this.displayUserInfo();

        // Generate OTP first
        await this.generateOTP();

        // Setup form events
        this.setupEvents();

        this.initialized = true;
      }

      getStoredUserData() {
        const stored = localStorage.getItem('pending_admin_user');
        if (stored) {
          try {
            return JSON.parse(stored);
          } catch (e) {
            return null;
          }
        }
        return null;
      }

      displayUserInfo() {
        const nameEl = document.getElementById('user-name');
        const emailEl = document.getElementById('user-email');

        if (nameEl && this.userData.name) {
          nameEl.textContent = this.userData.name;
        }
        if (emailEl && this.userData.email) {
          emailEl.textContent = this.userData.email;
        }
      }

      async generateOTP() {
        const Toast = getToast();
        const loading = Toast ? Toast.loading('Mengirim kode OTP...') : null;

        try {
          const result = await authApi.generateOTP(this.userData.userId, this.userData.email);

          if (loading) loading.close();

          if (result.success) {
            this.otpId = result.otpId;
            document.getElementById('otp-id').value = result.otpId || '';
            
            if (Toast) {
              Toast.success('OTP Dikirim', 'Kode OTP telah dikirim ke Telegram Anda');
            }
          } else {
            this.showError(result.message || 'Gagal mengirim OTP');
            if (Toast) {
              Toast.error('Gagal', result.message || 'Gagal mengirim OTP');
            }
          }
        } catch (error) {
          if (loading) loading.close();
          console.error('Generate OTP error:', error);
          this.showError('Terjadi kesalahan saat mengirim OTP');
          if (Toast) {
            Toast.error('Error', 'Terjadi kesalahan saat mengirim OTP');
          }
        }
      }

      setupEvents() {
        const form = document.getElementById('otp-form');
        if (form) {
          form.addEventListener('submit', (e) => {
            e.preventDefault();
            this.handleVerify();
          });
        }

        // Auto-format OTP input
        const otpInput = document.getElementById('otp-code');
        if (otpInput) {
          otpInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
          });
        }

        // Resend button
        const resendBtn = document.getElementById('resend-otp-btn');
        if (resendBtn) {
          resendBtn.addEventListener('click', () => {
            this.generateOTP();
          });
        }
      }

      async handleVerify() {
        const Toast = getToast();
        const otpCode = document.getElementById('otp-code')?.value.trim();
        const otpId = document.getElementById('otp-id')?.value || this.otpId;

        if (!otpCode || otpCode.length !== 6) {
          this.showError('Masukkan kode OTP 6 digit');
          if (Toast) {
            Toast.error('Error', 'Masukkan kode OTP 6 digit');
          }
          return;
        }

        const loading = Toast ? Toast.loading('Memverifikasi OTP...') : null;

        try {
          const result = await authApi.verifyOTP(otpId, otpCode, this.userData.userId);

          if (loading) loading.close();

          if (result.success && result.verified) {
            // Verification successful
            localStorage.setItem('user', JSON.stringify({
              userId: this.userData.userId,
              email: this.userData.email,
              name: this.userData.name,
              role: this.userData.role,
              noWa: this.userData.noWa,
              kelas: '-',
              sekolah: '-',
              status: 'active'
            }));
            
            localStorage.removeItem('pending_admin_user');
            localStorage.removeItem('admin_google_user');

            if (Toast) {
              Toast.success('Verifikasi Berhasil', 'Akun Anda telah diverifikasi! Mengalihkan ke dashboard...');
            }

            setTimeout(() => {
              window.location.href = 'dashboard-admin.html';
            }, 1500);
          } else {
            this.showError(result.message || 'Kode OTP tidak valid');
            if (Toast) {
              Toast.error('Gagal', result.message || 'Kode OTP tidak valid');
            }
          }
        } catch (error) {
          if (loading) loading.close();
          console.error('Verify OTP error:', error);
          this.showError('Terjadi kesalahan saat verifikasi');
          if (Toast) {
            Toast.error('Error', 'Terjadi kesalahan saat verifikasi');
          }
        }
      }

      showError(message) {
        const errorEl = document.getElementById('otp-error');
        if (errorEl) {
          errorEl.textContent = message;
          errorEl.classList.remove('hidden');
          
          setTimeout(() => {
            errorEl.classList.add('hidden');
            errorEl.textContent = '';
          }, 8000);
        }
      }

      redirectToLogin() {
        window.location.href = 'adsys.html';
      }
    }

    // Initialize
    const adminOTP = new AdminOTP();
    adminOTP.init();

    // Expose globally
    window.AdminOTP = AdminOTP;
  </script>

</body>
</html>
